<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;600;700;900&display=swap');
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400;1,700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1350px;
    font-family: 'Inter', sans-serif;
    overflow: hidden;
    position: relative;
  }

  .bg {
    position: absolute;
    inset: 0;
    background: linear-gradient(160deg, #1a0a2e 0%, #2d1b4e 20%, #5b21b6 40%, #7c3aed 55%, #a78bfa 70%, #c4b5fd 85%, #ede9fe 100%);
    z-index: 0;
  }

  .stars {
    position: absolute;
    inset: 0;
    z-index: 1;
    background-image:
      radial-gradient(2px 2px at 100px 150px, rgba(255,255,255,0.8), transparent),
      radial-gradient(2px 2px at 300px 80px, rgba(255,255,255,0.6), transparent),
      radial-gradient(3px 3px at 500px 200px, rgba(255,255,255,0.9), transparent),
      radial-gradient(2px 2px at 700px 100px, rgba(255,255,255,0.5), transparent),
      radial-gradient(2px 2px at 900px 250px, rgba(255,255,255,0.7), transparent),
      radial-gradient(3px 3px at 150px 400px, rgba(255,255,255,0.6), transparent),
      radial-gradient(2px 2px at 850px 50px, rgba(255,255,255,0.8), transparent),
      radial-gradient(2px 2px at 450px 350px, rgba(255,255,255,0.5), transparent),
      radial-gradient(3px 3px at 650px 300px, rgba(255,255,255,0.7), transparent),
      radial-gradient(2px 2px at 200px 280px, rgba(255,255,255,0.4), transparent);
  }

  .glitter-stripe {
    position: absolute;
    top: 0;
    left: -200px;
    width: 500px;
    height: 100%;
    background: linear-gradient(105deg, transparent 30%, rgba(255,255,255,0.04) 45%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 55%, transparent 70%);
    z-index: 2;
    transform: skewX(-15deg);
  }

  .content {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    padding: 60px 80px;
    text-align: center;
    color: white;
  }

  .top-tag {
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-bottom: 20px;
  }

  .emoji-row {
    font-size: 48px;
    margin-bottom: 30px;
    filter: drop-shadow(0 4px 20px rgba(139,92,246,0.4));
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 90px;
    line-height: 0.95;
    margin-bottom: 10px;
    background: linear-gradient(135deg, #ffffff 0%, #e0d4ff 40%, #a78bfa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 4px 30px rgba(139,92,246,0.5));
  }

  .main-title em {
    font-style: italic;
    font-weight: 400;
    font-size: 72px;
  }

  .cumple-de {
    font-weight: 100;
    font-size: 22px;
    letter-spacing: 12px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.7);
    margin-bottom: 8px;
  }

  .name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-style: italic;
    font-size: 120px;
    line-height: 1;
    background: linear-gradient(135deg, #fff 0%, #e0d4ff 50%, #8b5cf6 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 6px 40px rgba(139,92,246,0.6));
    margin-bottom: 30px;
  }

  .age-circle {
    width: 130px;
    height: 130px;
    border-radius: 50%;
    border: 3px solid rgba(255,255,255,0.3);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    margin-bottom: 40px;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(10px);
  }

  .age-number {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 64px;
    line-height: 1;
    color: white;
  }

  .age-label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    margin-top: 2px;
  }

  .divider {
    width: 200px;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
    margin-bottom: 40px;
  }

  .details {
    display: flex;
    flex-direction: column;
    gap: 16px;
    margin-bottom: 40px;
  }

  .detail-row {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .detail-icon {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: rgba(255,255,255,0.1);
    border: 1px solid rgba(255,255,255,0.15);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }

  .detail-text {
    text-align: left;
  }

  .detail-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
  }

  .detail-value {
    font-weight: 300;
    font-size: 20px;
    color: white;
  }

  .theme-tag {
    display: inline-block;
    padding: 10px 28px;
    border-radius: 50px;
    background: linear-gradient(135deg, rgba(139,92,246,0.3), rgba(91,33,182,0.3));
    border: 1px solid rgba(255,255,255,0.2);
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.85);
    backdrop-filter: blur(10px);
    margin-bottom: 20px;
  }

  .theme-tag span {
    font-weight: 300;
    letter-spacing: 1px;
  }

  .bottom-note {
    font-size: 13px;
    font-weight: 300;
    color: rgba(255,255,255,0.4);
    letter-spacing: 2px;
  }

  /* decorative circles */
  .deco-circle {
    position: absolute;
    border-radius: 50%;
    z-index: 3;
  }
  .deco-circle.c1 {
    width: 300px; height: 300px;
    top: -80px; right: -60px;
    background: radial-gradient(circle, rgba(167,139,250,0.2), transparent 70%);
  }
  .deco-circle.c2 {
    width: 200px; height: 200px;
    bottom: 100px; left: -60px;
    background: radial-gradient(circle, rgba(139,92,246,0.2), transparent 70%);
  }
  .deco-circle.c3 {
    width: 400px; height: 400px;
    bottom: -150px; right: -100px;
    background: radial-gradient(circle, rgba(124,58,237,0.15), transparent 70%);
  }
</style>
</head>
<body>
  <div class="bg"></div>
  <div class="stars"></div>
  <div class="glitter-stripe"></div>
  <div class="deco-circle c1"></div>
  <div class="deco-circle c2"></div>
  <div class="deco-circle c3"></div>

  <div class="content">
    <div class="top-tag">Estás invitado/a</div>
    <div class="emoji-row">🎤 ✨ 💖</div>

    <div class="cumple-de">El cumple de</div>
    <div class="name">Calu</div>

    <div class="age-circle">
      <div class="age-number">9</div>
      <div class="age-label">Años</div>
    </div>

    <div class="divider"></div>

    <div class="details">
      <div class="detail-row">
        <div class="detail-icon">📅</div>
        <div class="detail-text">
          <div class="detail-label">Fecha</div>
          <div class="detail-value">Sábado 1 de Marzo</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">🕐</div>
        <div class="detail-text">
          <div class="detail-label">Hora</div>
          <div class="detail-value">00:00 hs</div>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-icon">📍</div>
        <div class="detail-text">
          <div class="detail-label">Lugar</div>
          <div class="detail-value">A confirmar</div>
        </div>
      </div>
    </div>

    <div class="theme-tag">✨ Temática <span>Emilia Mernes</span> ✨</div>

    <div class="bottom-note">¡TE ESPERAMOS!</div>
  </div>
</body>
</html>
