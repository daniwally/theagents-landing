<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Resumen Financiero - Wally</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a; 
            color: #fff; 
            margin: 0; 
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            width: 800px; 
            background: #2a2a2a; 
            border-radius: 20px; 
            padding: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 300;
            font-size: 28px;
            color: #00ff88;
        }
        .chart-container { 
            position: relative; 
            height: 300px; 
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .stat {
            text-align: center;
            padding: 20px;
            background: #333;
            border-radius: 10px;
        }
        .stat-value {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        .stat-label {
            font-size: 14px;
            opacity: 0.7;
        }
        .pagado { color: #00ff88; }
        .pendiente { color: #ff4444; }
        .progress-bar {
            width: 100%;
            height: 20px;
            background: #444;
            border-radius: 10px;
            overflow: hidden;
            margin: 20px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #00ff88, #00cc66);
            width: 66%;
            transition: width 0.5s ease;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📊 Finanzas Marzo 2026</h1>
        
        <div class="chart-container">
            <canvas id="financeChart"></canvas>
        </div>

        <div class="progress-bar">
            <div class="progress-fill"></div>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value pagado">$4.4M</div>
                <div class="stat-label">✅ Pagado (66%)</div>
            </div>
            <div class="stat">
                <div class="stat-value pendiente">$2.3M</div>
                <div class="stat-label">🔴 Pendiente (34%)</div>
            </div>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('financeChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Pagado', 'Pendiente'],
                datasets: [{
                    data: [4398559, 2253994],
                    backgroundColor: ['#00ff88', '#ff4444'],
                    borderWidth: 0,
                    hoverOffset: 10
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        display: false
                    }
                },
                cutout: '60%'
            }
        });
    </script>
</body>
</html>
