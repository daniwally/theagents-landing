<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; width: 1280px; height: 720px; background: #1a1a1a; color: #fff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 80px; }
  .pre { font-size: 12px; font-weight: 600; letter-spacing: 5px; text-transform: uppercase; color: #c4001d; margin-bottom: 24px; }
  .title { font-size: 52px; font-weight: 900; text-align: center; line-height: 1.15; margin-bottom: 24px; }
  .sub { font-size: 18px; font-weight: 300; color: #888; text-align: center; line-height: 1.5; }
  .sub strong { color: #fff; font-weight: 600; }
  .footer { position: absolute; bottom: 40px; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: #444; }
  .red { color: #c4001d; }
</style>
</head>
<body>
  <div class="pre">Propuesta de proyecto</div>
  <div class="title">El primer <span class="red">influencer virtual</span><br>del fútbol argentino.</div>
  <div class="sub">Una iniciativa de <strong>Sancor Seguros</strong> para <strong>River Plate</strong><br>Producido por <strong>WTF Agency</strong></div>
  <div class="footer">WTF Agency · Brief Destroyers · 2026</div>
</body>
</html>
