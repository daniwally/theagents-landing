<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Popcorn Box - Calu's Birthday</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700;800;900&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  width: 1200px; 
  height: 1600px; 
  background: #f5f5f5;
  display: flex;
  justify-content: center;
  align-items: center;
}

.popcorn-template {
  width: 1100px;
  height: 1500px;
  position: relative;
  display: flex;
  flex-direction: row;
  justify-content: center;
  gap: 20px;
  padding: 20px;
}

/* Each panel of the popcorn box */
.panel {
  width: 260px;
  height: 1400px;
  background: linear-gradient(180deg, #7b2fbe 0%, #5c1f9e 40%, #4a1a8a 100%);
  border-radius: 12px;
  position: relative;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 15px;
}

/* Star burst pattern */
.panel::before {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: 
    repeating-conic-gradient(from 0deg at 50% 30%, transparent 0deg, rgba(255,255,255,0.03) 5deg, transparent 10deg);
  z-index: 0;
}

/* Diagonal stripes */
.panel::after {
  content: '';
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  background: repeating-linear-gradient(
    -45deg,
    transparent,
    transparent 20px,
    rgba(255,255,255,0.04) 20px,
    rgba(255,255,255,0.04) 22px
  );
  z-index: 0;
}

.panel-content {
  position: relative;
  z-index: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 20px;
  width: 100%;
  height: 100%;
}

.panel .star-deco {
  color: rgba(255,255,255,0.3);
  font-size: 28px;
  position: absolute;
  z-index: 1;
}
.panel .s1 { top: 80px; left: 15px; }
.panel .s2 { top: 250px; right: 15px; font-size: 20px; }
.panel .s3 { bottom: 200px; left: 20px; font-size: 24px; }
.panel .s4 { bottom: 400px; right: 10px; font-size: 16px; }

.disco-img {
  width: 140px;
  height: 140px;
  object-fit: contain;
  filter: drop-shadow(0 4px 15px rgba(200,100,255,0.5));
  margin-top: 40px;
}

.boots-img {
  width: 120px;
  height: 120px;
  object-fit: contain;
  filter: drop-shadow(0 4px 15px rgba(200,100,255,0.5));
}

.emilia-img {
  width: 180px;
  height: 220px;
  object-fit: cover;
  object-position: center top;
  border-radius: 12px;
  border: 2px solid rgba(255,255,255,0.3);
  box-shadow: 0 5px 20px rgba(80,20,140,0.5);
}

.panel-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 48px;
  color: #fff;
  text-align: center;
  letter-spacing: 4px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  writing-mode: vertical-rl;
  text-orientation: mixed;
  transform: rotate(180deg);
  margin-top: auto;
}

.panel-title-h {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 38px;
  color: #fff;
  text-align: center;
  letter-spacing: 3px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.3);
  line-height: 1.1;
}

.calu-name {
  font-family: 'Poppins', sans-serif;
  font-weight: 900;
  font-size: 36px;
  color: #ffd700;
  text-shadow: 0 2px 8px rgba(0,0,0,0.3);
  text-align: center;
}

.subtitle {
  font-family: 'Poppins', sans-serif;
  font-weight: 300;
  font-size: 16px;
  color: rgba(255,255,255,0.7);
  letter-spacing: 4px;
  text-transform: uppercase;
  text-align: center;
}

.lightning {
  font-size: 50px;
  filter: drop-shadow(0 0 10px rgba(255,215,0,0.6));
}

/* Tab indicators */
.tab-mark {
  position: absolute;
  bottom: 0;
  left: 50%;
  transform: translateX(-50%);
  width: 60%;
  height: 2px;
  background: rgba(255,255,255,0.2);
  border-radius: 1px;
}

.fold-line {
  width: 2px;
  height: 100%;
  background: rgba(255,255,255,0.15);
  position: absolute;
  top: 0;
}
.fold-l { left: -10px; }
.fold-r { right: -10px; }

.print-note {
  position: absolute;
  bottom: 10px;
  right: 20px;
  font-family: 'Poppins', sans-serif;
  font-size: 11px;
  color: #999;
  letter-spacing: 1px;
}
</style>
</head>
<body>
  <div class="popcorn-template">
    <!-- Panel 1: Front -->
    <div class="panel">
      <div class="star-deco s1">✦</div>
      <div class="star-deco s2">★</div>
      <div class="star-deco s3">✦</div>
      <div class="star-deco s4">★</div>
      <div class="panel-content">
        <div class="subtitle">★ CUMPLE ★</div>
        <div class="calu-name">CALU'S</div>
        <div class="panel-title-h">BIRTHDAY<br>PARTY</div>
        <img src="../disco.jpg" class="disco-img" alt="">
        <div class="lightning">⚡</div>
        <img src="../boots.jpg" class="boots-img" alt="">
        <div class="subtitle" style="margin-top:auto;">LET'S MAKE IT<br>ICONIC</div>
      </div>
    </div>

    <!-- Panel 2: Side -->
    <div class="panel">
      <div class="star-deco s1">★</div>
      <div class="star-deco s2">✦</div>
      <div class="star-deco s3">★</div>
      <div class="star-deco s4">✦</div>
      <div class="panel-content">
        <img src="../emilia.jpg" class="emilia-img" style="margin-top:60px;" alt="">
        <div class="lightning">⚡</div>
        <div class="calu-name" style="font-size:28px;">CALIFORNIA</div>
        <div class="panel-title-h" style="font-size:32px;">CUMPLE<br>9 AÑOS</div>
        <img src="../disco.jpg" class="disco-img" style="width:100px;height:100px;" alt="">
        <div class="subtitle" style="margin-top:auto; font-size:13px;">1 DE MARZO<br>2026</div>
      </div>
    </div>

    <!-- Panel 3: Back -->
    <div class="panel">
      <div class="star-deco s1">✦</div>
      <div class="star-deco s2">★</div>
      <div class="star-deco s3">✦</div>
      <div class="star-deco s4">★</div>
      <div class="panel-content">
        <div class="subtitle">★ BIRTHDAY ★</div>
        <div class="calu-name">CALU'S</div>
        <div class="panel-title-h">BIRTHDAY<br>PARTY</div>
        <img src="../boots.jpg" class="boots-img" style="width:140px;height:140px;" alt="">
        <div class="lightning">⚡</div>
        <img src="../disco.jpg" class="disco-img" style="width:120px;height:120px;" alt="">
        <div class="subtitle" style="margin-top:auto;">LET'S MAKE IT<br>ICONIC</div>
      </div>
    </div>

    <!-- Panel 4: Side -->
    <div class="panel">
      <div class="star-deco s1">★</div>
      <div class="star-deco s2">✦</div>
      <div class="star-deco s3">★</div>
      <div class="star-deco s4">✦</div>
      <div class="panel-content">
        <img src="../emilia.jpg" class="emilia-img" style="margin-top:60px;" alt="">
        <div class="lightning">⚡</div>
        <div class="calu-name" style="font-size:28px;">CALIFORNIA</div>
        <div class="panel-title-h" style="font-size:32px;">CUMPLE<br>9 AÑOS</div>
        <img src="../boots.jpg" class="boots-img" style="width:100px;height:100px;" alt="">
        <div class="subtitle" style="margin-top:auto; font-size:13px;">ARTILLEROS 2361<br>CABA</div>
      </div>
    </div>
  </div>
  <div class="print-note">✂ Cortar y doblar por las líneas</div>
</body>
</html>
