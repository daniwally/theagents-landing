<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ticket Cumple California</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Poppins:wght@300;400;600;700;800&family=Sacramento&family=Playfair+Display:ital,wght@1,700;1,900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #1a0a2e;
    position: relative;
  }

  /* Full background image */
  .bg-image {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    opacity: 0.45;
    filter: brightness(0.8) contrast(1.1);
    z-index: 0;
  }

  /* Purple/lilac gradient overlay */
  .overlay {
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: linear-gradient(
      180deg,
      rgba(200,160,240,0.3) 0%,
      rgba(180,130,230,0.4) 20%,
      rgba(140,80,200,0.2) 40%,
      rgba(100,40,160,0.3) 60%,
      rgba(80,20,140,0.6) 80%,
      rgba(40,10,80,0.9) 100%
    );
    z-index: 1;
  }

  /* Ticket container */
  .ticket {
    position: relative;
    z-index: 10;
    width: 940px;
    margin: 80px auto 0;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(220,180,255,0.3);
    border-radius: 30px;
    padding: 55px 60px 45px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  /* Dashed tear line */
  .tear-line {
    position: relative;
    z-index: 10;
    width: 940px;
    margin: 0 auto;
    border: none;
    border-top: 3px dashed rgba(220,180,255,0.4);
  }

  /* Ticket stub (bottom part) */
  .ticket-stub {
    position: relative;
    z-index: 10;
    width: 940px;
    margin: 0 auto;
    background: rgba(255,255,255,0.08);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border: 2px solid rgba(220,180,255,0.3);
    border-top: none;
    border-radius: 0 0 30px 30px;
    padding: 30px 60px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .ticket-top-label {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 22px;
    color: rgba(220,180,255,0.7);
    letter-spacing: 10px;
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .ticket-presents {
    font-family: 'Sacramento', cursive;
    font-size: 50px;
    color: rgba(230,200,255,0.8);
    margin-bottom: -10px;
  }

  .ticket-name {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-style: italic;
    font-size: 130px;
    color: #fff;
    text-shadow: 0 0 60px rgba(200,150,255,0.5), 0 4px 0 rgba(160,100,220,0.3);
    line-height: 1;
    margin: 10px 0;
    letter-spacing: 2px;
  }

  .ticket-cumple {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px;
    color: #e0c0ff;
    letter-spacing: 15px;
    margin: 5px 0 25px;
  }

  /* Emilia photo frame in ticket */
  .emilia-frame {
    width: 320px;
    height: 400px;
    object-fit: cover;
    object-position: center top;
    border-radius: 18px;
    border: 3px solid rgba(220,180,255,0.4);
    box-shadow: 0 10px 40px rgba(100,40,180,0.6);
    margin: 10px 0 25px;
  }

  /* Decorative stickers */
  .sticker {
    position: absolute;
    z-index: 20;
    filter: drop-shadow(0 4px 12px rgba(100,40,180,0.5));
  }
  .sticker-disco {
    width: 160px;
    top: 65px;
    right: 20px;
    transform: rotate(12deg);
  }
  .sticker-boots {
    width: 140px;
    bottom: 420px;
    left: 20px;
    transform: rotate(-15deg);
  }
  .sticker-disco2 {
    width: 120px;
    bottom: 180px;
    right: 30px;
    transform: rotate(-8deg);
    opacity: 0.7;
  }
  .sticker-boots2 {
    width: 110px;
    top: 350px;
    left: 15px;
    transform: rotate(10deg);
    opacity: 0.6;
  }

  /* Info section in ticket */
  .info-row {
    display: flex;
    justify-content: center;
    gap: 60px;
    width: 100%;
    margin-top: 10px;
  }

  .info-block {
    text-align: center;
  }

  .info-label {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 16px;
    color: rgba(220,180,255,0.6);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .info-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    color: #fff;
    letter-spacing: 3px;
  }

  .info-value-sm {
    font-family: 'Poppins', sans-serif;
    font-weight: 600;
    font-size: 26px;
    color: #e0c0ff;
    letter-spacing: 1px;
  }

  /* Stub content */
  .stub-left {
    text-align: left;
  }
  .stub-right {
    text-align: right;
  }
  .stub-label {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 14px;
    color: rgba(220,180,255,0.5);
    letter-spacing: 3px;
    text-transform: uppercase;
  }
  .stub-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 34px;
    color: #fff;
    letter-spacing: 2px;
  }
  .stub-code {
    font-family: 'Poppins', sans-serif;
    font-weight: 300;
    font-size: 18px;
    color: rgba(220,180,255,0.6);
    letter-spacing: 6px;
    margin-top: 5px;
  }

  /* Bottom "te espero" */
  .bottom-msg {
    position: absolute;
    bottom: 60px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 10;
  }
  .te-espero {
    font-family: 'Sacramento', cursive;
    font-size: 65px;
    color: rgba(230,200,255,0.8);
    text-shadow: 0 3px 20px rgba(100,40,180,0.4);
  }

  /* Circle cutouts on tear line */
  .cutout-left, .cutout-right {
    position: absolute;
    z-index: 11;
    width: 40px;
    height: 40px;
    background: #1a0a2e;
    border-radius: 50%;
  }
  .cutout-left {
    left: 50px;
    top: -20px;
  }
  .cutout-right {
    right: 50px;
    top: -20px;
  }

  .tear-wrapper {
    position: relative;
    z-index: 10;
    width: 940px;
    margin: 0 auto;
  }
</style>
</head>
<body>
  <!-- Background: Emilia photo -->
  <img src="emilia.jpg" class="bg-image" alt="">
  <div class="overlay"></div>

  <!-- Floating stickers -->
  <img src="disco.jpg" class="sticker sticker-disco" alt="">
  <img src="boots.jpg" class="sticker sticker-boots" alt="">
  <img src="disco.jpg" class="sticker sticker-disco2" alt="">
  <img src="boots.jpg" class="sticker sticker-boots2" alt="">

  <!-- Ticket main -->
  <div class="ticket">
    <div class="ticket-top-label">★ Cumpleaños ★</div>
    <div class="ticket-name">California</div>
    <div class="ticket-cumple">CUMPLE 9 AÑOS</div>

    <img src="emilia.jpg" class="emilia-frame" alt="">

    <div class="info-row">
      <div class="info-block">
        <div class="info-label">Fecha</div>
        <div class="info-value">DOM 1 MARZO</div>
      </div>
      <div class="info-block">
        <div class="info-label">Hora</div>
        <div class="info-value">15:30 HS</div>
      </div>
    </div>
  </div>

  <!-- Tear line -->
  <div class="tear-wrapper">
    <div class="cutout-left"></div>
    <div class="cutout-right"></div>
    <hr class="tear-line">
  </div>

  <!-- Stub -->
  <div class="ticket-stub">
    <div class="stub-left">
      <div class="stub-label">Lugar</div>
      <div class="stub-value">ARTILLEROS 2361</div>
      <div class="stub-label" style="margin-top:2px;">CABA</div>
    </div>
    <div class="stub-right">
      <div class="stub-label">Admit</div>
      <div class="stub-value">VIP ★</div>
      <div class="stub-code">CALU2026</div>
    </div>
  </div>

  <!-- Bottom -->
  <div class="bottom-msg">
    <div class="te-espero">¡Te espero!</div>
  </div>
</body>
</html>
