<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Resumen Financiero - Wally</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f8f9fa; 
            color: #2c3e50; 
            margin: 0; 
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container { 
            width: 800px; 
            background: white; 
            border-radius: 20px; 
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            border: 1px solid #e9ecef;
        }
        h1 { 
            text-align: center; 
            margin-bottom: 30px; 
            font-weight: 400;
            font-size: 28px;
            color: #2c3e50;
        }
        .chart-container { 
            position: relative; 
            height: 400px; 
            margin-bottom: 30px;
        }
        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            margin-top: 30px;
        }
        .stat {
            text-align: center;
            padding: 25px;
            background: #f8f9fa;
            border-radius: 15px;
            border: 1px solid #e9ecef;
        }
        .stat-value {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .stat-label {
            font-size: 14px;
            color: #6c757d;
            font-weight: 500;
        }
        .pagado { color: #27ae60; }
        .pendiente { color: #e74c3c; }
        .calu { color: #9b59b6; }
        .summary {
            text-align: center;
            margin-top: 25px;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 10px;
            font-size: 16px;
            color: #2c3e50;
            border: 1px solid #e9ecef;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Finanzas Marzo 2026</h1>
        
        <div class="chart-container">
            <canvas id="financeChart"></canvas>
        </div>

        <div class="stats">
            <div class="stat">
                <div class="stat-value pagado">$4.4M</div>
                <div class="stat-label">Otros Pagados (54%)</div>
            </div>
            <div class="stat">
                <div class="stat-value pendiente">$2.3M</div>
                <div class="stat-label">Supervielle (28%)</div>
            </div>
            <div class="stat">
                <div class="stat-value calu">$2.0M</div>
                <div class="stat-label">Total Calu (24%)</div>
            </div>
        </div>

        <div class="summary">
            <strong>Total Calu:</strong> $2.0M (64% pagado, 36% pendiente) | 
            <strong>Total gestión marzo:</strong> $8.2M
        </div>
    </div>

    <script>
        const ctx = document.getElementById('financeChart').getContext('2d');
        const chart = new Chart(ctx, {
            type: 'doughnut',
            data: {
                labels: ['Otros Pagados', 'Supervielle Pendiente', 'Calu (Total)'],
                datasets: [{
                    data: [3113693, 2253994, 1999866],
                    backgroundColor: ['#a8e6cf', '#ffc3a0', '#d4b5f7'],
                    borderColor: ['#27ae60', '#e74c3c', '#9b59b6'],
                    borderWidth: 2,
                    hoverOffset: 8
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: {
                    legend: {
                        position: 'bottom',
                        labels: {
                            padding: 20,
                            font: {
                                size: 14,
                                weight: '500'
                            },
                            color: '#2c3e50'
                        }
                    }
                },
                cutout: '50%'
            }
        });
    </script>
</body>
</html>
